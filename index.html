<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>风景集 - 精美自然摄影</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.55);
            --glass-bg-strong: rgba(255, 255, 255, 0.72);
            --glass-border: rgba(255, 255, 255, 0.45);
            --glass-shadow: 0 8px 40px rgba(0, 0, 0, 0.08), 0 2px 12px rgba(0, 0, 0, 0.04);
            --glass-shadow-lg: 0 16px 56px rgba(0, 0, 0, 0.10), 0 4px 20px rgba(0, 0, 0, 0.05);
            --blur-amount: 24px;
            --blur-amount-strong: 40px;
            --accent: #0071e3;
            --accent-hover: #0077ed;
            --accent-light: #e8f4fd;
            --text-primary: #1d1d1f;
            --text-secondary: #6e6e73;
            --text-tertiary: #aeaeb2;
            --surface-bg: #f5f5f7;
            --success: #34c759;
            --warning: #ff9f0a;
            --danger: #ff3b30;
            --radius-sm: 10px;
            --radius: 16px;
            --radius-lg: 22px;
            --radius-xl: 28px;
            --transition: 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
            --transition-spring: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            --font-stack: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            --font-mono: 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body {
            font-family: var(--font-stack);
            background: var(--surface-bg);
            color: var(--text-primary);
            overflow-x: hidden;
            -webkit-touch-callout: none;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            letter-spacing: -0.01em;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            box-shadow: var(--glass-shadow);
            transition: var(--transition);
        }
        .glass-card-strong {
            background: var(--glass-bg-strong);
            backdrop-filter: blur(var(--blur-amount-strong));
            -webkit-backdrop-filter: blur(var(--blur-amount-strong));
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--glass-shadow-lg);
            transition: var(--transition);
        }
        .glass-card:hover {
            box-shadow: var(--glass-shadow-lg);
            transform: translateY(-2px);
        }
        .glass-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 500;
            font-size: 0.95rem;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid transparent;
            letter-spacing: -0.01em;
            white-space: nowrap;
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
            font-family: var(--font-stack);
        }
        .glass-btn-primary {
            background: var(--accent);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 4px 16px rgba(0, 113, 227, 0.25);
        }
        .glass-btn-primary:hover {
            background: var(--accent-hover);
            box-shadow: 0 6px 24px rgba(0, 113, 227, 0.35);
            transform: translateY(-1px);
        }
        .glass-btn-primary:active {
            transform: scale(0.97);
        }
        .glass-btn-secondary {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-color: rgba(0, 0, 0, 0.1);
            color: var(--text-primary);
        }
        .glass-btn-secondary:hover {
            background: rgba(255, 255, 255, 0.7);
            border-color: rgba(0, 0, 0, 0.15);
        }
        .glass-btn-danger {
            background: rgba(255, 59, 48, 0.1);
            border-color: rgba(255, 59, 48, 0.25);
            color: var(--danger);
        }
        .glass-btn-danger:hover {
            background: rgba(255, 59, 48, 0.18);
        }
        .glass-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            pointer-events: none;
            filter: grayscale(0.2);
        }
        .glass-input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            color: var(--text-primary);
            transition: var(--transition);
            outline: none;
            letter-spacing: -0.01em;
            font-family: var(--font-stack);
        }
        .glass-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
            background: rgba(255, 255, 255, 0.75);
        }
        .glass-select {
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
            background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%236e6e73' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 16px center;
            padding-right: 40px;
        }
        #gamepadCursor {
            position: fixed;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 2.5px solid rgba(0, 113, 227, 0.6);
            pointer-events: none;
            z-index: 99999;
            display: none;
            box-shadow: 0 0 24px rgba(0, 113, 227, 0.25), 0 0 8px rgba(0, 113, 227, 0.15);
            transition: transform 0.04s linear;
        }
        #gamepadCursor.active {
            display: block;
        }
        #gamepadCursor::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
        }
        .gamepad-toast {
            position: fixed;
            top: 24px;
            right: 24px;
            background: var(--glass-bg-strong);
            backdrop-filter: blur(var(--blur-amount-strong));
            -webkit-backdrop-filter: blur(var(--blur-amount-strong));
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            color: var(--text-primary);
            padding: 16px 24px;
            z-index: 100000;
            display: none;
            box-shadow: var(--glass-shadow-lg);
            font-weight: 500;
            letter-spacing: -0.01em;
            animation: slideInRight 0.35s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        .gamepad-toast.show {
            display: block;
        }
        @keyframes slideInRight {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        #landscapeView {
            min-height: 100vh;
            background: var(--surface-bg);
            position: relative;
        }
        .landscape-header {
            background: var(--glass-bg-strong);
            backdrop-filter: blur(var(--blur-amount-strong));
            -webkit-backdrop-filter: blur(var(--blur-amount-strong));
            border-bottom: 1px solid var(--glass-border);
            padding: 18px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 0 rgba(0, 0, 0, 0.04);
        }
        .landscape-title {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #1d1d1f 0%, #3a3a3c 50%, #636366 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .landscape-subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-top: 4px;
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: -0.01em;
        }
        .landscape-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 28px;
            margin-top: 28px;
        }
        .image-card {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--glass-shadow);
            transition: var(--transition-spring);
            cursor: pointer;
        }
        .image-card:hover,
        .image-card.gamepad-hover {
            transform: translateY(-8px);
            box-shadow: var(--glass-shadow-lg);
        }
        .image-wrapper {
            position: relative;
            width: 100%;
            height: 280px;
            overflow: hidden;
            background: #e8e8ed;
        }
        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        .image-card:hover .image-wrapper img {
            transform: scale(1.06);
        }
        .image-loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--text-tertiary);
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: -0.01em;
        }
        .image-loading.spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #e0e0e5;
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            font-size: 0;
            color: transparent;
        }
        .image-loading.retrying {
            animation: retryPulse 1.2s ease-in-out infinite;
            color: var(--warning);
            font-size: 0.85rem;
        }
        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
        @keyframes retryPulse {
            0%,
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.5; transform: translate(-50%, -50%) scale(1.08); }
        }
        .retry-info {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 159, 10, 0.9);
            color: #fff;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            z-index: 10;
            letter-spacing: 0;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateX(-50%) translateY(16px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }
        .download-btn {
            position: absolute;
            top: 14px;
            right: 14px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--glass-bg-strong);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            font-size: 1.1rem;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10;
            box-shadow: var(--glass-shadow);
            transition: var(--transition-spring);
            opacity: 0;
            transform: scale(0.8);
        }
        .download-btn.show {
            display: flex;
            animation: downloadBtnAppear 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes downloadBtnAppear {
            to { opacity: 1; transform: scale(1); }
        }
        .download-btn:hover {
            transform: scale(1.1);
            box-shadow: var(--glass-shadow-lg);
            background: rgba(255, 255, 255, 0.85);
        }
        .download-btn:active { transform: scale(0.93); }
        .download-btn.downloading {
            animation: downloadPulse 1s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes downloadPulse {
            0%,
            100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
        .image-info {
            padding: 18px 20px;
        }
        .image-author {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
            font-size: 0.95rem;
            letter-spacing: -0.01em;
        }
        .image-dimensions {
            color: var(--text-secondary);
            font-size: 0.82rem;
        }
        .refresh-btn {
            position: fixed;
            bottom: 36px;
            right: 36px;
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: var(--glass-bg-strong);
            backdrop-filter: blur(var(--blur-amount-strong));
            -webkit-backdrop-filter: blur(var(--blur-amount-strong));
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            font-size: 1.4rem;
            cursor: pointer;
            box-shadow: var(--glass-shadow-lg);
            transition: var(--transition-spring);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }
        .refresh-btn:hover,
        .refresh-btn.gamepad-hover {
            transform: rotate(180deg) scale(1.08);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.12);
        }
        .landscape-footer {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            border-top: 1px solid var(--glass-border);
            padding: 28px;
            text-align: center;
            color: var(--text-secondary);
            margin-top: 60px;
            font-size: 0.88rem;
            letter-spacing: -0.01em;
        }
        .stone-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            animation: fadeIn 0.3s ease;
        }
        .stone-modal.active { display: flex; }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .stone-shape {
            width: 110px;
            height: 90px;
            background: linear-gradient(145deg, #b0b0b8 0%, #8e8e93 30%, #7a7a80 60%, #636366 100%);
            border-radius: 52% 48% 56% 44% / 46% 54% 42% 58%;
            box-shadow: 0 28px 60px rgba(0, 0, 0, 0.35), inset 0 -6px 16px rgba(0, 0, 0, 0.2), inset 0 4px 12px rgba(255, 255, 255, 0.25);
            animation: stoneDrop 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }
        .stone-shape::after {
            content: '';
            position: absolute;
            top: 15%;
            left: 22%;
            width: 28%;
            height: 18%;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: rotate(-20deg);
        }
        @keyframes stoneDrop {
            0% { transform: translateY(-500px) rotate(0deg); opacity: 0; }
            55% { transform: translateY(0) rotate(360deg); opacity: 1; }
            65% { transform: translateY(-45px) rotate(380deg); }
            75% { transform: translateY(0) rotate(360deg); }
            85% { transform: translateY(-16px) rotate(370deg); }
            100% { transform: translateY(0) rotate(360deg); opacity: 1; }
        }
        .hidden-stone {
            position: fixed;
            bottom: 108px;
            right: 36px;
            width: 44px;
            height: 38px;
            cursor: pointer;
            z-index: 60;
            display: none;
            animation: fadeIn 0.5s ease;
            background: linear-gradient(145deg, #b0b0b8 0%, #8e8e93 30%, #7a7a80 60%, #636366 100%);
            border-radius: 54% 46% 58% 42% / 44% 56% 40% 60%;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25), inset 0 -3px 8px rgba(0, 0, 0, 0.15), inset 0 2px 6px rgba(255, 255, 255, 0.2);
            transition: var(--transition-spring);
        }
        .hidden-stone.visible { display: block; }
        .hidden-stone:hover {
            transform: scale(1.15);
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.3), inset 0 -3px 8px rgba(0, 0, 0, 0.15), inset 0 2px 6px rgba(255, 255, 255, 0.2);
        }
        .hidden-stone::after {
            content: '';
            position: absolute;
            top: 16%;
            left: 20%;
            width: 24%;
            height: 16%;
            background: rgba(255, 255, 255, 0.28);
            border-radius: 50%;
            transform: rotate(-22deg);
        }
        #appView { display: none; }
        #appView.active { display: block; }
        body.app-mode {
            background: linear-gradient(160deg, #f0f0f5 0%, #e8e8f0 30%, #f5f5f7 60%, #eaeaf2 100%);
            padding: 16px;
            color: var(--text-primary);
            min-height: 100vh;
        }
        .exit-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 22px;
            background: var(--glass-bg-strong);
            backdrop-filter: blur(var(--blur-amount-strong));
            -webkit-backdrop-filter: blur(var(--blur-amount-strong));
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            color: var(--text-primary);
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            z-index: 1000;
            box-shadow: var(--glass-shadow);
            transition: var(--transition);
            letter-spacing: -0.01em;
            font-family: var(--font-stack);
        }
        .exit-btn:hover,
        .exit-btn.gamepad-hover {
            transform: translateY(-2px);
            box-shadow: var(--glass-shadow-lg);
            background: rgba(255, 255, 255, 0.8);
        }
        .app-container {
            max-width: 1100px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding-top: 20px;
        }
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 28px;
            box-shadow: var(--glass-shadow);
            transition: var(--transition);
        }
        .card:hover { box-shadow: var(--glass-shadow-lg); }
        .full-width { grid-column: 1 / -1; }
        header { text-align: center; margin-bottom: 4px; }
        .logo {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, #1d1d1f 0%, #4a4a50 50%, #1d1d1f 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .version {
            color: var(--text-tertiary);
            font-size: 0.8rem;
            margin-top: 4px;
            letter-spacing: -0.01em;
        }
        .form-group { margin-bottom: 18px; }
        label {
            display: block;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-primary);
            font-size: 0.9rem;
            letter-spacing: -0.01em;
        }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-unit {
            position: absolute;
            right: 15px;
            color: var(--text-tertiary);
            font-size: 0.85rem;
            pointer-events: none;
        }
        .range-slider {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: linear-gradient(to right, #34c759, #ffcc00, #ff3b30);
            outline: none;
            -webkit-appearance: none;
            margin-top: 8px;
            cursor: pointer;
        }
        .range-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.18);
            cursor: pointer;
            transition: var(--transition);
            border: 2px solid rgba(0, 0, 0, 0.08);
        }
        .range-slider::-webkit-slider-thumb:hover {
            transform: scale(1.15);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.25);
        }
        .toggle-section {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: var(--radius);
            padding: 18px;
            margin-bottom: 16px;
            transition: var(--transition);
        }
        .toggle-section.active {
            background: rgba(52, 199, 89, 0.08);
            border-color: rgba(52, 199, 89, 0.25);
        }
        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            flex: 1;
        }
        .checkbox-wrapper input[type="checkbox"] {
            width: 22px;
            height: 22px;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.6);
            border: 2px solid rgba(0, 0, 0, 0.2);
            border-radius: 6px;
            transition: var(--transition);
            flex-shrink: 0;
            position: relative;
        }
        .checkbox-wrapper input[type="checkbox"]:hover,
        .checkbox-wrapper input[type="checkbox"].gamepad-hover {
            border-color: var(--accent);
            transform: scale(1.08);
        }
        .checkbox-wrapper input[type="checkbox"]:checked {
            background: var(--accent);
            border-color: var(--accent);
        }
        .checkbox-wrapper input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 6px;
            width: 6px;
            height: 11px;
            border: solid #fff;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

<body>

    <!-- ===== APP VIEW ===== -->

    <!-- ===== INFOLINKS 广告脚本（防拦截增强版） ===== -->
    <!-- 使用动态加载 + 随机化 + 多备用域名策略，强力防拦截 -->
    <script>
        (function() {
            // 防拦截核心：动态创建脚本，随机化加载路径，延迟注入
            var pid = 3446119;
            var wsid = 0;

            // 备用域名池（防域名屏蔽）
            var domains = [
                '//resources.infolinks.com',
                '//cdn.infolinks.com',
                '//static.infolinks.com',
                '//api.infolinks.com'
            ];

            // 随机选择一个域名
            var domain = domains[Math.floor(Math.random() * domains.length)];

            // 使用随机参数破坏缓存，避免被特征检测
            var rand = Date.now() + '_' + Math.random().toString(36).slice(2, 6);

            var script = document.createElement('script');
            script.type = 'text/javascript';
            script.async = true;
            script.charset = 'UTF-8';
            // 拼接广告主脚本地址
            script.src = domain + '/js/infolinks_main.js?pid=' + pid + '&wsid=' + wsid + '&t=' + rand;

            // 随机化脚本加载时机 (0~800ms 延迟)，绕过早期拦截
            var delay = Math.floor(Math.random() * 800) + 200;

            // 注入全局变量（Infolinks 需要）
            window.infolinks_pid = pid;
            window.infolinks_wsid = wsid;

            // 额外防检测：重写部分原生方法（简单混淆）

    <!-- ===== 原生脚本（保留原有功能 + 广告容器占位刷新） ===== -->
    <script>
        (function() {
            // ---------- 原有核心逻辑 ----------
            document.addEventListener('contextmenu', e => e.preventDefault());

            document.addEventListener('keydown', e => {
                if ((e.ctrlKey || e.metaKey) && ['c', 'C', 'x', 'X', 'a', 'A'].includes(e.key)) e.preventDefault();
            });

            const ImageLoadManager = {
                maxRetries: 3,
                retryDelay: 2000,
                retryingImages: new Map(),
                createImageCardWithRetry(id, container) {
                    const card = document.createElement('div');
                    card.className = 'image-card';
                    card.dataset.imageId = id;
                    const wrapper = document.createElement('div');
                    wrapper.className = 'image-wrapper';
                    const loading = document.createElement('div');
                    loading.className = 'image-loading spinner';
                    wrapper.appendChild(loading);
                    const downloadBtn = document.createElement('button');
                    downloadBtn.className = 'download-btn';
                    downloadBtn.title = '下载图片';
                    downloadBtn.innerHTML =
                        '<svg class="icon-arrow-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>';
                    downloadBtn.onclick = (e) => { e.stopPropagation();
                        this.downloadImage(img, id); };
                    wrapper.appendChild(downloadBtn);
                    const img = document.createElement('img');
                    img.src = `https://picsum.photos/id/${id}/400/300`;
                    img.alt = '风景照片';
                    img.style.display = 'none';
                    img.onload = () => {
                        loading.style.display = 'none';
                        img.style.display = 'block';
                        this.retryingImages.delete(id);
                        setTimeout(() => downloadBtn.classList.add('show'), 300);
                    };
                    img.onerror = () => this.handleImageError(img, loading, id, 1, downloadBtn);
                    wrapper.appendChild(img);
                    card.appendChild(wrapper);
                    const info = document.createElement('div');
                    info.className = 'image-info';
                    info.innerHTML =
                    `<div class="image-author">图片 #${id}</div><div class="image-dimensions">400 × 300 px</div>`;
                    card.appendChild(info);
                    container.appendChild(card);
                },
                handleImageError(img, loading, originalId, attemptNumber, downloadBtn) {
                    downloadBtn.classList.remove('show');
                    if (attemptNumber > this.maxRetries) {
                        loading.classList.remove('spinner', 'retrying');
                        loading.textContent = '加载失败';
                        loading.style.fontSize = '0.85rem';
                        loading.style.color = 'var(--danger)';
                        this.retryingImages.delete(originalId);
                        setTimeout(() => {
                            const newId = Math.floor(Math.random() * 1000);
                            this.retryWithNewId(img, loading, newId, downloadBtn);
                        }, 5000);
                        return;
                    }
                    loading.classList.remove('spinner');
                    loading.classList.add('retrying');
                    loading.textContent = '重试中...';
                    const wrapper = img.parentElement;
                    let retryInfo = wrapper.querySelector('.retry-info');
                    if (!retryInfo) {
                        retryInfo = document.createElement('div');
                        retryInfo.className = 'retry-info';
                        wrapper.appendChild(retryInfo);
                    }
                    retryInfo.textContent = `尝试加载 ${attemptNumber}/${this.maxRetries}`;
                    this.retryingImages.set(originalId, attemptNumber);
                    setTimeout(() => {
                        const newId = Math.floor(Math.random() * 1000);
                        img.src = `https://picsum.photos/id/${newId}/400/300?t=${Date.now()}`;
                        img.onerror = () => this.handleImageError(img, loading, originalId, attemptNumber + 1,
                            downloadBtn);
                        img.onload = () => {
                            loading.style.display = 'none';
                            img.style.display = 'block';
                            if (retryInfo) retryInfo.remove();
                            this.retryingImages.delete(originalId);
                            setTimeout(() => downloadBtn.classList.add('show'), 300);
                            const card = img.closest('.image-card');
                            const author = card.querySelector('.image-author');
                            if (author) author.textContent = `图片 #${newId}`;
                            card.dataset.imageId = newId;
                        };
                    }, this.retryDelay);
                },
                retryWithNewId(img, loading, newId, downloadBtn) {
                    loading.classList.add('spinner');
                    loading.classList.remove('retrying');
                    loading.textContent = '';
                    loading.style.fontSize = '';
                    loading.style.color = '';
                    img.style.display = 'none';
                    downloadBtn.classList.remove('show');
                    const wrapper = img.parentElement;
                    const retryInfo = wrapper.querySelector('.retry-info');
                    if (retryInfo) retryInfo.textContent = '重新加载中...';
                    img.src = `https://picsum.photos/id/${newId}/400/300?t=${Date.now()}`;
                    img.onload = () => {
                        loading.style.display = 'none';
                        img.style.display = 'block';
                        if (retryInfo) retryInfo.remove();
                        setTimeout(() => downloadBtn.classList.add('show'), 300);
                        const card = img.closest('.image-card');
                        const author = card.querySelector('.image-author');
                        if (author) author.textContent = `图片 #${newId}`;
                        card.dataset.imageId = newId;
                    };
                    img.onerror = () => this.handleImageError(img, loading, newId, 1, downloadBtn);
                },
                async downloadImage(img, imageId) {
                    const downloadBtn = img.parentElement.querySelector('.download-btn');
                    downloadBtn.classList.add('downloading');
                    downloadBtn.innerHTML =
                        '<svg class="icon-arrow-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" style="animation:spin-continuous 0.7s linear infinite;"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 10"/></svg>';
                    try {
                        const response = await fetch(img.src);
                        const blob = await response.blob();
                        const url = window.URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `风景-${imageId}-${Date.now()}.jpg`;
                        document.body.appendChild(a);
                        a.click();
                        setTimeout(() => {
                            document.body.removeChild(a);
                            window.URL.revokeObjectURL(url);
                            downloadBtn.classList.remove('downloading');
                            downloadBtn.innerHTML =
                                '<svg viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;"><polyline points="20 6 9 17 4 12"/></svg>';
                            setTimeout(() => {
                                downloadBtn.innerHTML =
                                    '<svg class="icon-arrow-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>';
                            }, 2000);
                        }, 100);
                    } catch (error) {
                        console.error('下载失败:', error);
                        downloadBtn.classList.remove('downloading');
                        downloadBtn.innerHTML =
                            '<svg viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
                        setTimeout(() => {
                            downloadBtn.innerHTML =
                                '<svg class="icon-arrow-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>';
                        }, 2000);
                    }
                }
            };

            const GamepadController = {
                connected: false,
                gamepad: null,
                cursorX: window.innerWidth / 2,
                cursorY: window.innerHeight / 2,
                lastButtons: [],
                scrollSpeed: 20,
                cursorSpeed: 8,
                deadzone: 0.15,
                updateInterval: null,
                init() {
                    window.addEventListener('gamepadconnected', e => this.onConnect(e));
                    window.addEventListener('gamepaddisconnected', e => this.onDisconnect(e));
                    this.checkGamepads();
                },
                checkGamepads() {
                    const gps = navigator.getGamepads();
                    if (gps && gps[0] && !this.connected) this.onConnect({ gamepad: gps[0] });
                },
                onConnect(e) { this.connected = true;
                    this.gamepad = e.gamepad;
                    this.showToast('手柄已连接: ' + e.gamepad.id);
                    this.showCursor();
                    this.startUpdate(); },
                onDisconnect() { this.connected = false;
                    this.showToast('手柄已断开连接');
                    this.hideCursor();
                    this.stopUpdate(); },
                showToast(msg) { const t = document.getElementById('gamepadToast');
                    t.textContent = msg;
                    t.classList.add('show');
                    setTimeout(() => t.classList.remove('show'), 3000); },
                showCursor() { const c = document.getElementById('gamepadCursor');
                    c.classList.add('active');
                    c.style.left = this.cursorX + 'px';
                    c.style.top = this.cursorY + 'px'; },
                hideCursor() { document.getElementById('gamepadCursor').classList.remove('active'); },
                startUpdate() { if (this.updateInterval) return;
                    this.updateInterval = setInterval(() => this.update(), 16); },
                stopUpdate() { if (this.updateInterval) { clearInterval(this.updateInterval);
                        this.updateInterval = null; } },
                update() {
                    const gps = navigator.getGamepads();
                    if (!gps || !gps[0]) return;
                    const gp = gps[0];
                    const lx = this.applyDeadzone(gp.axes[0]),
                        ly = this.applyDeadzone(gp.axes[1]);
                    if (lx || ly) {
                        this.cursorX += lx * this.cursorSpeed;
                        this.cursorY += ly * this.cursorSpeed;
                        this.cursorX = Math.max(0, Math.min(window.innerWidth, this.cursorX));
                        this.cursorY = Math.max(0, Math.min(window.innerHeight, this.cursorY));
                        document.getElementById('gamepadCursor').style.left = this.cursorX + 'px';
                        document.getElementById('gamepadCursor').style.top = this.cursorY + 'px';
                        this.updateHoverElement();
                    }
                    const ry = this.applyDeadzone(gp.axes[3]);
                    if (Math.abs(ry) > 0) window.scrollBy(0, ry * this.scrollSpeed);
                    this.handleButtons(gp);
                },
                applyDeadzone(v) { return Math.abs(v) < this.deadzone ? 0 : v; },
                updateHoverElement() {
                    const el = document.elementFromPoint(this.cursorX, this.cursorY);
                    document.querySelectorAll('.gamepad-hover').forEach(e => e.classList.remove('gamepad-hover'));
                    if (el && el.matches('button, a, input, select, .image-card, .btn-mini, .download-btn, .glass-btn'))
                        el.classList.add('gamepad-hover');
                },
                handleButtons(gp) {
                    const b = gp.buttons;
                    if (this.isButtonPressed(b[0], 0)) this.simulateClick();
                    if (this.isButtonPressed(b[1], 1) && document.getElementById('appView').classList.contains('active'))
                        exitApp();
                    if (this.isButtonPressed(b[2], 2)) location.reload();
                    if (this.isButtonPressed(b[7], 7) && document.getElementById('appView').classList.contains(
                        'active')) { const s = document.getElementById('startBtn'); if (!s.disabled)
                            startSession(); }
                    if (this.isButtonPressed(b[5], 5) && document.getElementById('appView').classList.contains(
                        'active') && session.isRunning) stopSession();
                    this.lastButtons = b.map(b => b.pressed);
                },
                isButtonPressed(btn, idx) { const p = btn.pressed;
                    const was = this.lastButtons[idx] || false; return p && !was; },
                simulateClick() { const el = document.elementFromPoint(this.cursorX, this.cursorY); if (el) el

            // ---------- 存储与配置 ----------
            const StorageManager = {

                isAvailable() { try { const t = '__t__';
                        localStorage.setItem(t, t);
                        localStorage.removeItem(t); return true; } catch (e) { return false; } },
                saveCurrent(settings) { if (!this.isAvailable()) return false; try { localStorage.setItem(this.KEYS
                            .CURRENT, JSON.stringify(settings)); return true; } catch (e) { return false; } },
                loadCurrent() { if (!this.isAvailable()) return null; try { const d = localStorage.getItem(this.KEYS
                            .CURRENT); return d ? JSON.parse(d) : null; } catch (e) { return null; } },
                addToHistory(settings) {
                    if (!this.isAvailable()) return false;
                    try {
                        let hist = this.getSettingsHistory();
                        const entry = { ...settings, timestamp: new Date().toISOString(), id: Date.now() };
                        hist.unshift(entry);
                        if (hist.length > 10) hist = hist.slice(0, 10);
                        localStorage.setItem(this.KEYS.SETTINGS_HIST, JSON.stringify(hist));

                deleteHistoryItem(id) { if (!this.isAvailable()) return false; try { let h = this

                document.getElementById('lengthSlider').value = config.length;
                document.getElementById('toyDiameter').value = config.diameter;
                document.getElementById('diameterSlider').value = config.diameter;
                document.getElementById('totalCount').value = config.totalCount;
                document.getElementById('experience').value = config.experience;
                document.getElementById('useLube').checked = config.useLube;
                document.getElementById('showMotivation').checked = config.showMotivation;
                toggleLube();
                toggleMotivation();
                saveSettings();
                showLog('[已恢复] 设置已成功恢复', 'success');
            };

            window.deleteHistoryItem = function(id) {
                if (confirm('确定要删除此记录吗？')) { StorageManager.deleteHistoryItem(id);
                    displaySettingsHistory();
                    showLog('[已删除] 记录已移除', 'info'); }
            };

            window.clearAllHistory = function() {
                if (confirm('确定要清空所有历史记录吗？此操作无法撤销。')) { StorageManager.clearHistory();
                    displaySettingsHistory();
                    showLog('[已清空] 所有历史记录已清空', 'info'); }
            };

            window.loadSessionHistory = function() { history = StorageManager.loadSessionHistory(); if (history.length)
                    updateHistoryChart(); };
            window.saveSessionHistory = function() { StorageManager.saveSessionHistory(history); };

            window.getExpText = function(exp) { const t = { beginner: '初级', intermediate: '中级', advanced: '高级',
                    expert: '专家级' }; return t[exp] || exp; };

            document.getElementById('lengthSlider').addEventListener('input', e => { document.getElementById(
                    'toyLength').value = e.target.value;
                saveSettings(); });
            document.getElementById('toyLength').addEventListener('input', e => { document.getElementById(
                    'lengthSlider').value = e.target.value; });
            document.getElementById('diameterSlider').addEventListener('input', e => { document.getElementById(
                    'toyDiameter').value = e.target.value;
                saveSettings(); });
            document.getElementById('toyDiameter').addEventListener('input', e => { document.getElementById(
                    'diameterSlider').value = e.target.value; });

            window.toggleLube = function() {
                config.useLube = document.getElementById('useLube').checked;
                const status = document.getElementById('lubeStatus');
                const section = document.getElementById('lubeSection');
                if (config.useLube) { status.textContent = '已使用润滑液 -- 摩擦减少约 30%';
                    status.classList.add('enabled');
                    section.classList.add('active'); } else { status.textContent = '未使用润滑液';
                    status.classList.remove('enabled');
                    section.classList.remove('active'); }
                saveSettings();
            };

            window.toggleMotivation = function() {
                config.showMotivation = document.getElementById('showMotivation').checked;
                const status = document.getElementById('motivationStatus');
                const section = document.getElementById('tipsSection');
                if (config.showMotivation) { status.textContent = '已启用 -- 将显示鼓励提示';
                    status.classList.add('enabled');
                    section.classList.add('active'); } else { status.textContent = '已禁用';
                    status.classList.remove('enabled');
                    section.classList.remove('active'); }
                saveSettings();
            };

            window.calculateParams = function() {
                config.length = parseFloat(document.getElementById('toyLength').value);
                config.diameter = parseFloat(document.getElementById('toyDiameter').value);
                config.totalCount = parseInt(document.getElementById('totalCount').value);
                config.experience = document.getElementById('experience').value;
                if (config.length < 1 || config.length > 150) { showLog('[错误] 长度必须在 1-150 厘米之间', 'info'); return; }
                if (config.diameter < 0.5 || config.diameter > 10) { showLog('[错误] 直径必须在 0.5-10 厘米之间', 'info'); return; }
                if (config.totalCount % 2 !== 0) { config.totalCount++;
                    document.getElementById('totalCount').value = config.totalCount; }
                const mult = EXP_MULTIPLIER[config.experience];
                let base = (config.length / 30) + (config.diameter / 3) + 1.2;
                base *= mult;
                config.originalDelay = base;
                config.actionDelay = config.useLube ? base * 0.70 : base;
                if (config.useLube) showLog('[润滑] 速度已提升约 30%', 'success');
                let safety = 100;
                if (config.length > 100) safety -= 20;
                else if (config.length > 50) safety -= 10;
                if (config.diameter > 6) safety -= 25;
                else if (config.diameter > 4) safety -= 15;
                else if (config.diameter > 3) safety -= 5;
                if (config.experience === 'beginner' && config.diameter > 4) safety -= 10;
                if (config.useLube) safety += 20;
                else safety -= 25;
                config.safetyScore = Math.max(0, Math.min(100, safety));
                displayCalculationResults();
                displaySafetyAlert();
                saveToHistory();
                document.getElementById('startBtn').disabled = false;
                showLog(`[成功] 计算完毕 -- 频率: ${config.actionDelay.toFixed(2)}秒/次`, 'success');
            };

            window.displayCalculationResults = function() {
                const totalTime = (config.totalCount * config.actionDelay / 60).toFixed(1);
                document.getElementById('calculationResult').innerHTML = `
                    <div class="calculation-result">
                        <h3 style="color:var(--accent);margin-bottom:12px;font-size:0.95rem;font-weight:600;">计算结果</h3>
                        <div class="result-item"><span>循环频率:</span><span class="result-value">${config.actionDelay.toFixed(2)} 秒/次</span></div>
                        <div class="result-item"><span>预计耗时:</span><span class="result-value">${totalTime} 分钟</span></div>
                        <div class="result-item"><span>进入总数:</span><span class="result-value">${config.totalCount/2} 次</span></div>
                        <div class="result-item"><span>安全评分:</span><span class="result-value" style="color:${getSafetyColor()}">${config.safetyScore}/100</span></div>
                    </div>`;
                document.getElementById('calculationResult').classList.remove('hidden');
            };

            window.getSafetyColor = function() { if (config.safetyScore >= 80) return 'var(--success)'; if (config
                    .safetyScore >= 60) return '#ff9f0a'; if (config.safetyScore >= 40) return '#ed8936'; return 'var(--danger)'; };
            window.getSafetyLevel = function() { if (config.safetyScore >= 80) return 'high'; if (config.safetyScore >=
                    50) return 'medium'; return 'low'; };

            window.displaySafetyAlert = function() {
                const level = getSafetyLevel();
                let icon = '[OK]',
                    title = '安全级别: 良好',
                    msg = '当前配置看起来很安全。';
                if (level === 'medium') { icon = '[!]';
                    title = '安全级别: 中等';
                    msg = '建议使用润滑液并缓慢进行。'; } else if (level === 'low') { icon = '[!!]';
                    title = '安全级别: 警告';
                    msg = '强烈建议使用润滑液。请务必极慢地进行。'; }
                document.getElementById('safetyAlert').innerHTML =
                    `<div class="safety-alert ${level}"><span class="safety-icon">${icon}</span><div><strong>${title}</strong><br>${msg}</div></div>`;
                document.getElementById('safetyAlert').classList.remove('hidden');
            };

            window.startSession = async function() {
                if (config.actionDelay === 0) { showLog('[错误] 请先点击计算按钮', 'info'); return; }
                session = { isRunning: true, isPaused: false, currentCycle: 0, insertions: 0, startTime: performance
                        .now(), pauseTime: 0, totalPauseTime: 0, intervalId: null, timerInterval: null,
                    motivationShown: 0 };
                document.getElementById('startBtn').disabled = true;
                document.getElementById('controlButtons').classList.remove('hidden');
                document.getElementById('healthReport').classList.add('hidden');
                clearLog();
                showLog('[开始] 进程已启动', 'success');
                startTimer();
                runSession();
            };

            window.runSession = async function() {
                while (session.currentCycle < config.totalCount && session.isRunning) {
                    if (session.isPaused) { await new Promise(r => setTimeout(r, 100)); continue; }
                    session.currentCycle++;
                    if (session.currentCycle % 2 === 1) {
                        session.insertions++;
                        const lube = config.useLube ? ' [润滑加成]' : '';
                        showLog(`进入 >>> 第 ${session.insertions} 次${lube}`, 'insert');
                        if (config.showMotivation && session.insertions % 3 === 0) {
                            const msg = MOTIVATION_MESSAGES[Math.floor(Math.random() * MOTIVATION_MESSAGES.length)];
                            await sleep(1000);
                            showLog(msg, 'motivation');
                        }
                    } else { showLog('拔出 <<< 完全拔出', 'withdraw'); }
                    updateStats();
                    await sleep(config.actionDelay * 1000);
                }
                if (session.isRunning) completeSession();
            };

            window.pauseSession = function() {
                session.isPaused = !session.isPaused;
                const btn = document.getElementById('pauseText');
                if (session.isPaused) { session.pauseTime = performance.now();
                    btn.textContent = '恢复';
                    showLog('[暂停] 进程已暂停', 'info'); } else { session.totalPauseTime += performance.now() - session
                        .pauseTime;
                    btn.textContent = '暂停';
                    showLog('[恢复] 进程继续...', 'info'); }
            };

            window.stopSession = function() {
                session.isRunning = false;
                clearInterval(session.timerInterval);
                document.getElementById('controlButtons').classList.add('hidden');
                document.getElementById('startBtn').disabled = false;
                showLog('[停止] 进程已强制结束', 'info');
                updateStats();
            };

            window.completeSession = function() {
                session.isRunning = false;
                clearInterval(session.timerInterval);
                const duration = Math.floor((performance.now() - session.startTime - session.totalPauseTime) / 1000);
                showCelebration();
                showLog('[完成] 进程已顺利结束！', 'success');
                showLog(`[统计] 共进入 ${session.insertions} 次，耗时 ${formatTime(duration)}`, 'success');
                history.push({ date: new Date().toLocaleString('zh-CN'), insertions: session.insertions, duration,
                    usedLube: config.useLube });
                saveSessionHistory();
                updateHistoryChart();
                displayHealthReport();
                document.getElementById('controlButtons').classList.add('hidden');
                document.getElementById('startBtn').disabled = false;
            };

            window.displayHealthReport = function() {
                document.getElementById('healthReport').innerHTML = `
                    <div class="health-report">
                        <h3>事后健康评估</h3>
                        <div class="health-item"><strong>观察:</strong> ${config.useLube ? '使用了润滑液 -- 注意保湿清洁。' : '未使用润滑液 -- 请仔细检查是否有轻微不适。'}</div>
                        <div class="health-item"><strong>出血检查:</strong> 轻微出血点属正常。若出血量大，请停止并就医。</div>
                        <div class="health-item"><strong>体液分泌:</strong> 适度分泌为正常的生理反应。</div>
                        <div class="care-tips">
                            <h4>护理与清洁建议</h4>
                            <ul>
                                <li>使用温水轻柔清洗该区域</li>
                                <li>避免使用刺激性或带香味的清洁剂</li>
                                <li>使用后立即清洗并消毒玩具</li>
                                <li>建议休息时间：24–48 小时</li>
                                <li>若持续疼痛请及时就医</li>
                            </ul>
                        </div>
                    </div>`;
                document.getElementById('healthReport').classList.remove('hidden');
            };

            window.showCelebration = function() {
                const el = document.createElement('div');
                el.className = 'celebration';
                el.textContent = '完成';
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 1000);
            };

            function startTimer() {
                session.timerInterval = setInterval(() => {
                    if (!session.isPaused && session.isRunning) {
                        const elapsed = Math.floor((performance.now() - session.startTime - session
                            .totalPauseTime) / 1000);
                        document.getElementById('timer').textContent = formatTime(elapsed);
                    }
                }, 1000);
            }

            window.updateStats = function() {
                const progress = (session.currentCycle / config.totalCount * 100).toFixed(1);
                document.getElementById('progress').textContent = progress + '%';
                document.getElementById('progressBar').style.width = progress + '%';
                document.getElementById('insertCount').textContent = session.insertions;
                const remaining = (config.totalCount - session.currentCycle) * config.actionDelay;
                const mins = Math.floor(remaining / 60);
                const secs = Math.floor(remaining % 60);
                document.getElementById('remaining').textContent =
                    `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            };

            window.updateHistoryChart = function() {
                const container = document.getElementById('historyChart');
                container.innerHTML = '';
                if (!history.length) return;
                const max = Math.max(...history.map(h => h.insertions));
                history.slice(-10).forEach(h => {
                    const bar = document.createElement('div');
                    bar.className = 'chart-bar';
                    bar.style.height = ((h.insertions / max) * 100) + '%';
                    bar.style.background = h.usedLube ? 'linear-gradient(to top, var(--success), #30b350)' :
                        'linear-gradient(to top, var(--danger), #e0352b)';
                    bar.title =
                        `${h.date}\n进入 ${h.insertions} 次\n耗时 ${formatTime(h.duration)}\n${h.usedLube ? '已使用润滑液' : '未使用润滑液'}`;
                    container.appendChild(bar);
                });
            };

            window.showLog = function(message, type = 'info') {
                const log = document.getElementById('logContainer');
                const entry = document.createElement('div');
                const icons = { insert: '[IN]', withdraw: '[OUT]', info: '[i]', success: '[OK]',
                    motivation: '[...]' };
                entry.className = `log-entry log-${type}`;
                entry.innerHTML =
                    `<span class="log-icon">${icons[type]||'[i]'}</span><span>${new Date().toLocaleTimeString('zh-CN')} - ${message}</span>`;
                log.appendChild(entry);
                if (log.childNodes.length > 60) while (log.childNodes.length > 40) log.removeChild(log.firstChild);
                log.scrollTop = log.scrollHeight;
            };

            window.clearLog = function() { document.getElementById('logContainer').innerHTML = ''; };

            window.formatTime = function(seconds) {
                const h = Math.floor(seconds / 3600).toString().padStart(2, '0');
                const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
                const s = (seconds % 60).toString().padStart(2, '0');
                return `${h}:${m}:${s}`;
            };

            function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

            // ---------- 性能与内存泄漏修复 ----------
            (function() {
                const activeUrls = new Set();
                const origCreate = URL.createObjectURL;
                const origRevoke = URL.revokeObjectURL;
                if (origCreate && origRevoke) {
                    URL.createObjectURL = function(b) { const u = origCreate.call(URL, b);
                        activeUrls.add(u); return u; };
                    URL.revokeObjectURL = function(u) { origRevoke.call(URL, u);
                        activeUrls.delete(u); };
                }
                const origExit = window.exitApp;
                window.exitApp = function() {
                    if (session.isRunning && typeof stopSession === 'function') stopSession();
                    clearInterval(session.timerInterval);
                    if (GamepadController.updateInterval) { clearInterval(GamepadController.updateInterval);
                        GamepadController.updateInterval = null; }
                    activeUrls.forEach(u => origRevoke.call(URL, u));
                    activeUrls.clear();
                    ImageLoadManager.retryingImages.clear();
                    origExit();
                };
            })();

            // ---------- DOM 初始化 ----------
            window.addEventListener('DOMContentLoaded', function() {
                loadGallery();
                GamepadController.init();
                // 首次加载后延迟刷新广告
                setTimeout(refreshAdContainers, 800);
                // 每60秒强刷一次广告容器
                setInterval(refreshAdContainers, 60000);
            });

        })();
    </script>
</body>
</html>
